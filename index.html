<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>XNFT Preview Card</title>
  </head>

  <body>
    <main class="card">
      <div class="card__images">
        <img
          src="./assets/image-equilibrium.jpg"
          alt="Equilibrium"
          class="card__image"
        />

        <div class="card__images-layer">
          <img src="./assets/icon-view.svg" alt="view" />
        </div>
      </div>

      <div class="card__title">
        <h1>Equilibrium #3429</h1>

        <p id="info">Our Equilibrium collection promotes balance and calm.</p>
      </div>

      <div class="card__time">
        <div class="card__time-left">
          <img src="./assets/icon-ethereum.svg" alt="" />
          <span>0.041 ETH</span>
        </div>

        <div class="card__time-right">
          <img src="./assets/icon-clock.svg" alt="" />
          <span>3 days left</span>
        </div>
      </div>

      <div class="card__creator">
        <img src="./assets/image-avatar.png" alt="creator" />

        <p>
          Creation of
          <strong>Shivam Kumar</strong>
        </p>
      </div>
    </main>

    <footer class="attribution">
      Challenge by

      <a href="https://www.crio.do" target="_blank"> Crio </a>

      . Coded by
      <a href="https://www.github.com/shivamNov22" target="_blank">
        Shivam Kumar
      </a>
    </footer>
  </body>
</html>
